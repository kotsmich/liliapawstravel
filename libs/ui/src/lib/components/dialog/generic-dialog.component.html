<p-dialog
  [(visible)]="visible"
  [modal]="config.modal ?? true"
  [draggable]="config.draggable ?? false"
  [resizable]="config.resizable ?? false"
  [closable]="config.closable ?? true"
  [style]="{ width: config.width ?? '600px', maxWidth: config.maxWidth ?? '95vw' }"
  [contentStyle]="{ overflow: 'visible' }"
  (onHide)="onHide()">

  <ng-template pTemplate="header">
    <div class="flex flex-column gap-1">
      <span class="font-semibold text-lg">{{ config.title }}</span>
      <span *ngIf="config.subtitle" class="text-sm" style="color: var(--color-text-muted)">
        {{ config.subtitle }}
      </span>
    </div>
  </ng-template>

  <ng-content></ng-content>

  <ng-template *ngIf="config.showFooter !== false" pTemplate="footer">
    <div class="flex justify-content-end gap-2">
      <p-button
        *ngIf="config.cancelLabel !== 'none'"
        [label]="config.cancelLabel ?? 'Cancel'"
        severity="secondary"
        [outlined]="true"
        (onClick)="onHide()">
      </p-button>
      <p-button
        *ngIf="config.confirmLabel !== 'none'"
        [label]="config.confirmLabel ?? 'Save'"
        [severity]="config.confirmSeverity ?? 'primary'"
        [icon]="config.confirmIcon ?? ''"
        [loading]="config.confirmLoading ?? loading"
        [disabled]="config.confirmDisabled ?? false"
        (onClick)="onConfirm()">
      </p-button>
    </div>
  </ng-template>

</p-dialog>
