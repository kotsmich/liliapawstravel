<p-datepicker
  [inline]="true"
  [minDate]="minDate"
  [(ngModel)]="selectedDateObj"
  (onSelect)="onSelect($event)"
  styleClass="trip-cal"
  [panelStyle]="{ width: '100%', boxSizing: 'border-box' }"
  [showOtherMonths]="true"
  [selectOtherMonths]="true"
  >
  <ng-template pTemplate="date" let-date>
    <span
      class="date-cell flex flex-column align-items-center justify-content-center"
      [pTooltip]="getEventTooltip(date)"
      tooltipPosition="top"
      >
      {{ date.day }}
      @if (hasEvent(date)) {
        <span
          class="dot"
          [style.background]="eventColor(date)"
        ></span>
      }
    </span>
  </ng-template>
</p-datepicker>
