<p-datepicker
  [inline]="true"
  [minDate]="minDate"
  [(ngModel)]="selectedDateObj"
  (onSelect)="onSelect($event)"
  styleClass="trip-cal"
>
  <ng-template pTemplate="date" let-date>
    <span
      class="date-cell"
      [pTooltip]="hasEvent(date) ? 'Transport scheduled' : ''"
      tooltipPosition="top"
    >
      {{ date.day }}
      <span
        *ngIf="hasEvent(date)"
        class="dot"
        [style.background]="eventColor(date)"
      ></span>
    </span>
  </ng-template>
</p-datepicker>
