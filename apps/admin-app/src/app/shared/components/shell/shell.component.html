<div class="layout flex flex-column">

  <!-- Top navbar -->
  <header class="topbar flex align-items-center flex-shrink-0">
    <div class="topbar__brand flex align-items-center gap-2">
      <span aria-hidden="true">🐾</span>
      <span class="topbar__brand-name">Lilia Paws</span>
    </div>

    <nav class="topbar__nav flex align-items-center flex-1" aria-label="Admin navigation">
      @for (item of navItems; track item.link) {
        <button
          type="button"
          class="nav-item flex align-items-center"
          [class.active]="isActive(item.link)"
          (click)="navigateTo(item.link)"
          >
          <span class="nav-item__icon-wrap flex align-items-center justify-content-center">
            <i [class]="item.icon"></i>
            @if (item.link === '/admin/requests' && (pendingCount$ | async); as count) {
              <span class="nav-badge flex align-items-center justify-content-center">{{ count }}</span>
            }
            @if (item.link === '/admin/messages' && (unreadMessagesCount$ | async); as count) {
              <span class="nav-badge flex align-items-center justify-content-center">{{ count }}</span>
            }
          </span>
          <span class="nav-item__label">{{ item.labelKey | transloco }}</span>
        </button>
      }
    </nav>

    <div class="topbar__end flex align-items-center gap-2">
      <div class="fs-wrap">
        <button
          type="button"
          class="fs-btn flex align-items-center justify-content-center"
          [pTooltip]="fontPanelOpen() ? '' : ('shell.fontSize' | transloco)"
          tooltipPosition="bottom"
          (click)="toggleFontPanel()"
        >
          <i class="pi pi-sliders-h"></i>
        </button>

        @if (fontPanelOpen()) {
          <div class="fs-backdrop" (click)="fontPanelOpen.set(false)"></div>
          <div class="fs-panel">
            <span class="fs-panel__label">{{ 'shell.fontSize' | transloco }}</span>
            <div class="fs-panel__row flex align-items-center gap-2">
              <i class="pi pi-search-minus fs-panel__icon"></i>
              <input
                type="range" min="90" max="200" step="5"
                class="fs-panel__track"
                [value]="fontSizeService.size()"
                (input)="fontSizeService.size.set(+$any($event.target).value)"
              />
              <i class="pi pi-search-plus fs-panel__icon"></i>
            </div>
            <button type="button" class="fs-panel__reset" (click)="fontSizeService.size.set(100)">
              Reset
            </button>
          </div>
        }
      </div>
      <!-- <app-language-switcher /> -->
      <p-button
        icon="pi pi-sign-out"
        [text]="true"
        [rounded]="true"
        severity="secondary"
        styleClass="logout-btn"
        [pTooltip]="'shell.logout' | transloco"
        tooltipPosition="bottom"
        (onClick)="logout()"
        />
    </div>
  </header>

  <div class="content flex-1">
    <router-outlet></router-outlet>
  </div>

</div>
