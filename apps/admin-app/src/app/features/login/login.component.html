<div class="login-page flex align-items-center justify-content-center">
  <div class="login-card">
    <div class="login-card__brand">
      <span>🐾</span>
      <h1>{{ 'login.title' | transloco }}</h1>
    </div>

    @if (error$ | async; as error) {
      <p-message severity="error" [text]="error" styleClass="mb-3 w-full" />
    }

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <div class="field">
        <p-ifta-label>
          <input pInputText id="email" formControlName="email" type="email" class="w-full" />
          <label for="email">{{ 'login.email' | transloco }}</label>
        </p-ifta-label>
        @if (form.get('email')?.touched && form.get('email')?.invalid) {
          <small class="p-error">
            {{ 'login.emailRequired' | transloco }}
          </small>
        }
      </div>

      <div class="field">
        <p-ifta-label>
          <p-password
            inputId="password"
            formControlName="password"
            [feedback]="false"
            [toggleMask]="true"
            styleClass="w-full"
            inputStyleClass="w-full"
            />
          <label for="password">{{ 'login.password' | transloco }}</label>
        </p-ifta-label>
        @if (form.get('password')?.touched && form.get('password')?.invalid) {
          <small class="p-error">
            {{ 'login.passwordMinLength' | transloco }}
          </small>
        }
      </div>

      <p-button
        type="submit"
        styleClass="w-full submit-btn"
        [label]="(loading$ | async) ? ('login.signingIn' | transloco) : ('login.signIn' | transloco)"
        icon="pi pi-sign-in"
        [loading]="!!(loading$ | async)"
        [disabled]="!!(loading$ | async)"
        />
    </form>

  </div>
</div>
