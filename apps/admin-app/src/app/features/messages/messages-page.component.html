<p-toast />
<div class="messages-page">
  <app-page-header [title]="'messages.title' | transloco">
    @if (unreadCount(); as unread) {
      <span actions class="unread-label">{{ 'messages.unreadCount' | transloco: { count: unread } }}</span>
    }
  </app-page-header>

  <app-loading-overlay [loading]="loading()" [rows]="3">
    <p-card>
      <app-messages-list
        [messages]="messages()"
        (rowClicked)="openMessage($event)"
        (deleteClicked)="deleteMessage($event)"
        />
    </p-card>
  </app-loading-overlay>
</div>

<app-message-detail-dialog
  [message]="selectedMessage()"
  [visible]="dialogVisible()"
  (visibleChange)="onDialogVisibleChange($event)"
  (deleteClicked)="deleteMessage($event)"
  />
