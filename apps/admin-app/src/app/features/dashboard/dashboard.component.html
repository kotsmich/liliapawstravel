<div class="dashboard flex flex-column gap-4">
  <app-page-header [title]="'dashboard.title' | transloco">
    <p-button actions [label]="'dashboard.newTrip' | transloco" icon="pi pi-plus" (onClick)="navigateToNewTrip()" />
  </app-page-header>

  @if (loading$ | async) {
    <ui-loading-spinner [message]="'dashboard.loading' | transloco" />
  }

  @if (!(loading$ | async)) {
    @if ({
      total: totalTrips$ | async,
      upcoming: upcomingCount$ | async,
      completed: completedCount$ | async,
      recent: recentTrips$ | async
      }; as vm) {
      <app-dashboard-stats
        [totalTrips]="vm.total ?? 0"
        [upcomingTrips]="vm.upcoming ?? 0"
        [completedTrips]="vm.completed ?? 0"
        />
      <app-recent-trips
        [trips]="vm.recent ?? []"
        (navigateToAllTrips)="navigateToAllTrips()"
        (viewTrip)="onViewTrip($event)"
        />
    }
  }
</div>
