<p-card styleClass="recent-card">
  <ng-template pTemplate="header">
    <div class="card-header flex align-items-center justify-content-between">
      <span class="card-title">{{ 'dashboard.recentTrips' | transloco }}</span>
      <p-button [label]="'dashboard.viewAll' | transloco" [text]="true" (onClick)="navigateToAllTrips.emit()" />
    </div>
  </ng-template>

  <div class="table-scroll">
    <app-generic-table
      [data]="trips()"
      [columns]="columns()"
      [actions]="actions()"
      [config]="tableConfig()">
    </app-generic-table>
  </div>
</p-card>
