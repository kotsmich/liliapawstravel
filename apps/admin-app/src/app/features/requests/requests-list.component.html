<div class="requests-page">
  <app-page-header title="Trip Requests"></app-page-header>

  <p-toast />
  <p-confirmdialog />

  @if ({
    pending: pendingCount$ | async,
    approved: approvedCount$ | async,
    rejected: rejectedCount$ | async,
    requests: finalRequests$ | async,
    loading: loading$ | async,
    selectedTripId: selectedTripId$ | async,
    activeTab: activeTab$ | async
    }; as vm) {
    <app-requests-filter
      [tripOptions]="tripOptions"
      [selectedTripId]="vm.selectedTripId"
      [activeTab]="vm.activeTab ?? 'all'"
      [pendingCount]="vm.pending ?? 0"
      [approvedCount]="vm.approved ?? 0"
      [rejectedCount]="vm.rejected ?? 0"
      (tripSelected)="selectedTripId$.next($event)"
      (tabChanged)="activeTab$.next($event)"
      />
    <app-requests-table
      [requests]="vm.requests ?? []"
      [loading]="!!vm.loading"
      (rowClicked)="openDetail($event)"
      (approve)="onApproveFromTable($event)"
      (reject)="onRejectFromTable($event)"
      (deleteRequest)="deleteRequest($event)"
      />
  }

  <app-request-detail-dialog
    [visible]="dialogVisible"
    [request]="selectedRequest"
    [trips]="trips"
    (visibleChange)="dialogVisible = $event"
    (approve)="approve()"
    (reject)="reject()"
    (deleteRequest)="deleteRequest($event)"
    (cancel)="cancel()"
    />
</div>
