<div class="requests-page">
  <app-page-header [title]="'requests.title' | transloco"></app-page-header>

  <p-toast />
  <p-confirmdialog />

  <app-requests-filter
    [tripOptions]="tripOptions()"
    [selectedTripId]="selectedTripId()"
    [activeTab]="activeTab()"
    [pendingCount]="pendingCount()"
    [approvedCount]="approvedCount()"
    [rejectedCount]="rejectedCount()"
    [cancelledCount]="cancelledCount()"
    (tripSelected)="onTripSelected($event)"
    (tabChanged)="activeTab.set($event)"
    />
  <app-requests-table
    [requests]="finalRequests()"
    [loading]="loading()"
    [selection]="selectedRequests()"
    (selectionChange)="onSelectionChange($event)"
    (rowClicked)="openDetail($event)"
    (approve)="onApproveFromTable($event)"
    (reject)="onRejectFromTable($event)"
    (bulkApprove)="onBulkApprove($event)"
    (bulkReject)="onBulkReject($event)"
    />

  <app-request-detail-dialog
    [visible]="dialogVisible()"
    [request]="selectedRequest()"
    [trips]="trips()"
    (visibleChange)="dialogVisible.set($event)"
    (approve)="approve()"
    (reject)="reject()"
    (cancel)="cancel()"
    (saveNote)="onSaveNote($event)"
    />
</div>
