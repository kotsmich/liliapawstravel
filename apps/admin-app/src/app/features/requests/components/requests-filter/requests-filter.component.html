<!-- Trip filter -->
<div class="filter-bar">
  <p-select
    [options]="tripOptions()"
    [ngModel]="selectedTripId()"
    (ngModelChange)="tripSelected.emit($event)"
    optionLabel="label"
    optionValue="value"
    [placeholder]="'requests.allTrips' | transloco"
    styleClass="trip-select">
    <ng-template pTemplate="item" let-opt>
      <div class="trip-option">
        <span>{{ opt.label }}</span>
        @if (opt.pending > 0) {
          <p-badge [value]="opt.pending.toString()" severity="danger" />
        }
      </div>
    </ng-template>
  </p-select>
</div>

<!-- Status tabs -->
<p-tabs [value]="activeTab()" (valueChange)="tabChanged.emit($event?.toString() ?? activeTab())">
  <p-tablist>
    <p-tab value="all">{{ 'requests.all' | transloco }}</p-tab>
    <app-status-tab value="pending"   labelKey="requests.pending"   [count]="pendingCount()"   severity="warn"      />
    <app-status-tab value="approved"  labelKey="requests.approved"  [count]="approvedCount()"  severity="success"   />
    <app-status-tab value="rejected"  labelKey="requests.rejected"  [count]="rejectedCount()"  severity="danger"    />
    <app-status-tab value="cancelled" labelKey="requests.cancelled" [count]="cancelledCount()" severity="secondary" />
  </p-tablist>
</p-tabs>
