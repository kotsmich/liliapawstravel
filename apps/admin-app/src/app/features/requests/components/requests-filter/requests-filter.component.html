<!-- Trip filter -->
<div class="filter-bar">
  <p-select
    [options]="tripOptions"
    [ngModel]="selectedTripId"
    (ngModelChange)="tripSelected.emit($event)"
    optionLabel="label"
    optionValue="value"
    [placeholder]="'requests.allTrips' | transloco"
    styleClass="trip-select">
    <ng-template pTemplate="item" let-opt>
      <div class="trip-option">
        <span>{{ opt.label }}</span>
        @if (opt.pending > 0) {
          <p-badge [value]="opt.pending.toString()" severity="danger" />
        }
      </div>
    </ng-template>
  </p-select>
</div>

<!-- Status tabs -->
<p-tabs [value]="activeTab" (valueChange)="tabChanged.emit($event?.toString() ?? activeTab)">
  <p-tablist>
    <p-tab value="all">{{ 'requests.all' | transloco }}</p-tab>
    <p-tab value="pending">
      {{ 'requests.pending' | transloco }}
      @if (pendingCount > 0) {
        <p-badge
          [value]="pendingCount.toString()"
          severity="warn"
          class="tab-badge"
          />
      }
    </p-tab>
    <p-tab value="approved">
      {{ 'requests.approved' | transloco }}
      @if (approvedCount > 0) {
        <p-badge
          [value]="approvedCount.toString()"
          severity="success"
          class="tab-badge"
          />
      }
    </p-tab>
    <p-tab value="rejected">
      {{ 'requests.rejected' | transloco }}
      @if (rejectedCount > 0) {
        <p-badge
          [value]="rejectedCount.toString()"
          severity="danger"
          class="tab-badge"
          />
      }
    </p-tab>
  </p-tablist>
</p-tabs>
