<p-dialog
  [header]="'requests.detail.header' | transloco"
  [visible]="visible()"
  (visibleChange)="visibleChange.emit($event)"
  [modal]="true"
  [style]="{ width: '95vw', height: '95vh' }"
  [contentStyle]="{ overflowY: 'auto', height: '100%' }"
  [draggable]="false">

  @if (request(); as req) {
    <p class="request-summary">
      {{ 'requests.detail.requestFor' | transloco: { trip: tripDate(req.tripId), requester: req.requesterName } }}
    </p>

    <app-request-info-grid [req]="req" [tripDateLabel]="tripDate(req.tripId)" />

    <div class="dogs-section">
      <h3>{{ 'requests.detail.dogsSection' | transloco: { count: req.dogs.length } }}</h3>
      <div class="table-wrapper">
        <app-generic-table
          [data]="req.dogs"
          [columns]="dogColumns()"
          [config]="dogConfig()">
        </app-generic-table>
      </div>
    </div>

    <app-internal-note-editor
      [note]="req.adminNote ?? ''"
      (noteSaved)="saveNote.emit($event)" />
  }

  <p-dialog
    [header]="previewHeader()"
    [visible]="previewVisible()"
    (visibleChange)="previewVisible.set($event)"
    [modal]="true"
    [draggable]="false"
    [style]="{ width: isDocPreview() ? 'min(90vw, 700px)' : 'min(80vw, 360px)' }">
    <app-media-viewer
      [url]="previewUrl()"
      frameHeight="70vh"
      imgMaxHeight="50vh" />
  </p-dialog>

  <ng-template pTemplate="footer">
    <app-request-detail-footer
      [status]="request()?.status"
      (approve)="approve.emit()"
      (reject)="reject.emit()"
      (cancel)="cancel.emit()" />
  </ng-template>
</p-dialog>
