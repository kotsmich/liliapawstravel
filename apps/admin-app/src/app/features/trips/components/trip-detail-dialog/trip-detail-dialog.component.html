<p-dialog
  [header]="header()"
  [visible]="visible()"
  (visibleChange)="visibleChange.emit($event)"
  [modal]="true"
  [style]="{ width: '95vw', height: '95vh' }"
  [contentStyle]="{ overflowX: 'auto', overflowY: 'auto', height: '100%' }"
  [draggable]="false"
  (onHide)="onHide()">

  @if (trip()) {
    <app-trip-dogs-tabs
      [tripId]="trip()?.id ?? null"
      [activeTab]="activeTab()"
      (activeTabChange)="tabChanged.emit($event)"
      [showExportPdf]="true"
      [requests]="requests()"
      (rowClicked)="openDogDetail($event)"
      (exportPdf)="onExportPdf()" />
  }
</p-dialog>

<app-dog-detail-dialog
  [visible]="dogDetailVisible()"
  [dog]="selectedDog()"
  (visibleChange)="dogDetailVisible.set($event)">
</app-dog-detail-dialog>
