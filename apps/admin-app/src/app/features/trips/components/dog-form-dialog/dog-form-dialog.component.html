<p-dialog
  [visible]="visible()"
  (visibleChange)="visibleChange.emit($event)"
  [modal]="true"
  [style]="{ width: '860px', maxWidth: '96vw', height: '70vh' }"
  [contentStyle]="{ 'overflow-y': 'auto', 'flex': '1', padding: '1.25rem 1.5rem' }"
  [draggable]="false"
  [resizable]="false"
  [closable]="false"
  [header]="isNewDog ? ('dogs.addDogs' | transloco) : ('dogs.editDog' | transloco)">

  <!-- ── ADD MODE: accordion of dog panels ── -->
  @if (isNewDog) {
    <p-accordion [multiple]="true" [(value)]="activeAccordionPanels">
      @for (panel of panelForms; track $index) {
        <p-accordion-panel [value]="$index.toString()">
          <p-accordion-header>
            <span class="panel-label">{{ panelLabel($index) }}</span>
            @if (panelForms.length > 1) {
              <p-button
                icon="pi pi-trash"
                severity="danger"
                [text]="true"
                size="small"
                class="remove-btn"
                (onClick)="$event.stopPropagation(); removePanel($index)" />
            }
          </p-accordion-header>
          <p-accordion-content>
            <app-dog-fields [form]="panel" [idx]="$index" [requestors]="requestors()" />
          </p-accordion-content>
        </p-accordion-panel>
      }
    </p-accordion>

    <div class="add-panel-row">
      <p-button
        [label]="'dogs.addAnotherDog' | transloco"
        icon="pi pi-plus"
        severity="secondary"
        [outlined]="true"
        size="small"
        type="button"
        (onClick)="addPanel()" />
    </div>
  }

  <!-- ── EDIT MODE: single form ── -->
  @if (!isNewDog) {
    <app-dog-fields
      [form]="editForm"
      idx="edit"
      [requestors]="requestors()"
      [existingPhotoUrl]="dog()?.photoUrl ?? null"
      [existingDocumentUrl]="dog()?.documentUrl ?? null"
      (photoFileChange)="photoFileChange.emit($event)"
      (documentFileChange)="documentFileChange.emit($event)" />
  }

  <ng-template pTemplate="footer">
    <p-button [label]="'dogs.cancel' | transloco" [outlined]="true" type="button" (onClick)="onCancel()" />
    <p-button
      [label]="saving() ? ('dogs.saving' | transloco) : (isNewDog ? ('dogs.addDogsAction' | transloco) : ('dogs.update' | transloco))"
      icon="pi pi-check"
      type="button"
      [loading]="saving()"
      [disabled]="saving() || formInvalid()"
      (onClick)="onSave()" />
  </ng-template>
</p-dialog>
