<p-dialog
  [(visible)]="visible"
  [modal]="true"
  [style]="{ width: '660px', maxWidth: '96vw' }"
  [contentStyle]="{ 'overflow-y': 'auto', 'max-height': '70vh', padding: '1.25rem 1.5rem' }"
  [draggable]="false"
  [resizable]="false"
  [closable]="false"
  [header]="isNewDog ? 'Add Dogs' : 'Edit Dog'">

  <!-- ── ADD MODE: accordion of dog panels ── -->
  @if (isNewDog) {
    <p-accordion [multiple]="true" [(value)]="activeAccordionPanels">
      @for (panel of panelForms; track $index) {
        <p-accordion-panel [value]="$index.toString()">
          <p-accordion-header>
            <span class="panel-label">{{ panelLabel($index) }}</span>
            @if (panelForms.length > 1) {
              <p-button
                icon="pi pi-trash"
                severity="danger"
                [text]="true"
                size="small"
                class="remove-btn"
                (onClick)="$event.stopPropagation(); removePanel($index)" />
            }
          </p-accordion-header>
          <p-accordion-content>
            <app-dog-fields [form]="panel" [idx]="$index" />
          </p-accordion-content>
        </p-accordion-panel>
      }
    </p-accordion>

    <div class="add-panel-row">
      <p-button
        label="Add Another Dog"
        icon="pi pi-plus"
        severity="secondary"
        [outlined]="true"
        size="small"
        type="button"
        (onClick)="addPanel()" />
    </div>
  }

  <!-- ── EDIT MODE: single form ── -->
  @if (!isNewDog) {
    <app-dog-fields [form]="editForm" idx="edit" />
  }

  <ng-template pTemplate="footer">
    <p-button label="Cancel" [outlined]="true" type="button" (onClick)="onCancel()" />
    <p-button
      [label]="saving ? 'Saving...' : (isNewDog ? 'Add Dog(s)' : 'Update')"
      icon="pi pi-check"
      type="button"
      [loading]="saving"
      [disabled]="saving"
      (onClick)="onSave()" />
  </ng-template>
</p-dialog>
