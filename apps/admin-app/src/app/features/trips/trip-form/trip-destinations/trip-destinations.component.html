<div class="destinations-card">
  <div class="destinations-card__header">
    <span>📍 {{ 'trips.form.destinations' | transloco }}</span>
    <small class="destinations-card__hint">{{ 'trips.form.destinationsHint' | transloco }}</small>
  </div>

  <div class="destination-chips">
    @for (dest of destinations(); track $index) {
      <p-chip
        [label]="dest.name"
        [removable]="true"
        (onRemove)="removeDestination.emit($index)"
        class="destination-chip" />
    }
    @if (destinations().length === 0) {
      <span class="destinations-empty">{{ 'trips.form.noDestinations' | transloco }}</span>
    }
  </div>

  <div class="add-destination-row">
    <input
      pInputText
      [formControl]="inputCtrl()"
      [placeholder]="'trips.form.destinationPlaceholder' | transloco"
      class="destination-input"
      (keydown.enter)="addDestination.emit(); $event.preventDefault()" />
    <p-button
      icon="pi pi-plus"
      [label]="'trips.form.addDestination' | transloco"
      severity="secondary"
      [outlined]="true"
      size="small"
      type="button"
      (onClick)="addDestination.emit()" />
  </div>

  @if (hasError()) {
    <small class="p-error">{{ 'trips.form.destinationsRequired' | transloco }}</small>
  }
</div>
