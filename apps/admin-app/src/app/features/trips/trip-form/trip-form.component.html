<div class="form-page flex flex-column">
  <app-trip-form-header
    [title]="isEdit ? ('trips.form.editTrip' | transloco) : ('trips.form.newTrip' | transloco)"
    [saveLabel]="mutating() ? ('trips.form.saving' | transloco) : (isEdit ? ('trips.form.updateTrip' | transloco) : ('trips.form.createTrip' | transloco))"
    [isSaving]="mutating()"
    (cancel)="navigateToTrips()"
    (save)="onSubmit()" />

  <p-toast />
  <p-confirmdialog />

  <form id="tripForm" [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
    <app-trip-info-form
      [form]="form"
      [isEdit]="isEdit"
      [today]="today"
      [statuses]="statuses()"
      [isAtCapacity]="isAtCapacity()"
      [capacityWarning]="capacityWarning()"
      [dogsCount]="dogManager.dogsData().length" />

    <app-trip-destinations
      [destinations]="destinationsValue"
      [inputCtrl]="destinationInputCtrl"
      [hasError]="!!(form.get('destinations')?.touched && form.get('destinations')?.invalid)"
      (addDestination)="addDestination()"
      (removeDestination)="removeDestination($event)" />

    @if (isEdit) {
      <app-trip-dogs-manager
        [tripId]="editId"
        (rowClicked)="openDogDetail($event)" />
    }
  </form>
</div>

<app-dog-detail-dialog
  [visible]="dogDetailVisible"
  [dog]="selectedDog"
  (visibleChange)="dogDetailVisible = $event" />
