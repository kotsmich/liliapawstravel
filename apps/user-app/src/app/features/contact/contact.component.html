<div class="page">
  <div class="page-header">
    <div class="container">
      <span class="tag">{{ 'contact.tag' | transloco }}</span>
      <h1>{{ 'contact.title' | transloco }}</h1>
    </div>
  </div>

  <div class="container body">
    <div class="info-cards flex flex-column gap-3">
      <div class="info-card"><span aria-hidden="true">📧</span><h3>{{ 'contact.emailLabel' | transloco }}</h3><p>liliapawstravel&#64;gmail.com</p></div>
      <div class="info-card"><span aria-hidden="true">📞</span><h3>{{ 'contact.phoneLabel' | transloco }}</h3><p>+30 6907288150</p><p>+30 6948225016</p></div>
      <div class="info-card"><span aria-hidden="true">⏰</span><h3>{{ 'contact.responseLabel' | transloco }}</h3><p>{{ 'contact.responseTime' | transloco }}</p></div>
    </div>

    <app-contact-form
      [form]="contactForm"
      [loading]="!!(loading$ | async)"
      [success]="!!(success$ | async)"
      [error]="(error$ | async)"
      (formSubmit)="onSubmit()"
      (reset)="onReset()"
    />
  </div>
</div>
