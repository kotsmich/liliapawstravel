<div class="page">
  <div class="page-header">
    <div class="container">
      <span class="tag">Get In Touch</span>
      <h1>We'd love to hear from you</h1>
    </div>
  </div>

  <div class="container body">
    <div class="info-cards flex flex-column gap-3">
      <div class="info-card"><span>📧</span><h3>Email</h3><p>hello&#64;liliapawstravel.com</p></div>
      <div class="info-card"><span>📞</span><h3>Phone</h3><p>+31 6 12 34 56 78</p></div>
      <div class="info-card"><span>⏰</span><h3>Response</h3><p>Within 24 hours</p></div>
      <div class="info-card"><span>🌍</span><h3>Coverage</h3><p>18 countries</p></div>
    </div>

    <app-contact-form
      [form]="form"
      [loading]="!!(loading$ | async)"
      [success]="!!(success$ | async)"
      [error]="(error$ | async)"
      (formSubmit)="onSubmit()"
      (reset)="onReset()"
    />
  </div>
</div>
