<section class="cta">
  <div class="container">
    <div class="cta__box">
      <span aria-hidden="true">🐶</span>
      <h2>{{ 'cta.title' | transloco }}</h2>
      <p>{{ 'cta.subtitle' | transloco }}</p>
      <div class="cta__actions flex justify-content-center flex-wrap">
        <button class="btn-primary" type="button" (click)="requestClicked.emit()">{{ 'cta.bookTransport' | transloco }}</button>
        <button class="btn-outline-light" type="button" (click)="contactClicked.emit()">{{ 'cta.askQuestion' | transloco }}</button>
      </div>
    </div>
  </div>
</section>
