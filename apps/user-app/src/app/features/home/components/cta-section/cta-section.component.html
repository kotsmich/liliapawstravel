<section class="cta">
  <div class="container">
    <div class="cta__box">
      <span aria-hidden="true">🐶</span>
      <h2>Ready to bring your dog home?</h2>
      <p>Submit a transport request and we'll respond within 24 hours.</p>
      <div class="cta__actions flex justify-content-center flex-wrap">
        <button class="btn-primary" type="button" (click)="requestClicked.emit()">Book a Transport</button>
        <button class="btn-outline-light" type="button" (click)="contactClicked.emit()">Ask a Question</button>
      </div>
    </div>
  </div>
</section>
