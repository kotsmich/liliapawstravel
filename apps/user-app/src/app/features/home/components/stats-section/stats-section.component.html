<section class="stats">
  <div class="container">
    <div class="stats__grid">
      @for (s of stats; track s) {
        <div class="stat flex flex-column gap-2">
          <span class="stat__value">{{ s.value }}</span>
          <span class="stat__label">{{ s.label }}</span>
        </div>
      }
    </div>
  </div>
</section>
