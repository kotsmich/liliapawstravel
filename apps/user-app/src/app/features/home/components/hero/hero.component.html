<section class="hero" aria-label="Hero banner">

  <!-- ── Background Slider ── -->
  <div class="hero__slides" aria-hidden="true">
    @for (slide of slides; track $index; let i = $index) {
      <div class="hero__slide" [class.active]="i === currentSlide">
        <img
          class="hero__bg"
          [src]="slide.image"
          [alt]="slide.captionKey | transloco"
          loading="eager"
        />
      </div>
    }
    <!-- Gradient overlays -->
    <div class="hero__gradient-bottom"></div>
    <div class="hero__gradient-left"></div>
  </div>

  <!-- ── Main Content ── -->
  <div class="hero__inner">
    <div class="hero__content">
      <h1 class="hero__title">
        {{ 'hero.title' | transloco }}<br>
        <em>{{ 'hero.titleAccent' | transloco }}</em>
      </h1>

      <p class="hero__subtitle">{{ 'hero.subtitle' | transloco }}</p>

      <div class="hero__actions">
        <button class="btn-primary" type="button" (click)="requestClicked.emit()">
          {{ 'hero.requestTransport' | transloco }}
        </button>
        <button class="btn-outline-light" type="button" (click)="contactClicked.emit()">
          {{ 'hero.getInTouch' | transloco }}
        </button>
      </div>

      <div class="hero__dots" role="tablist" aria-label="Slide navigation">
        @for (slide of slides; track $index; let i = $index) {
          <button
            class="hero__dot"
            type="button"
            role="tab"
            [class.active]="i === currentSlide"
            (click)="goTo(i)"
            [attr.aria-label]="'Slide ' + (i + 1)"
            [attr.aria-selected]="i === currentSlide"
          ></button>
        }
      </div>
    </div>
  </div>

</section>
