<nav class="navbar" [class.scrolled]="scrolled" aria-label="Main navigation">
  <div class="navbar__container flex align-items-center justify-content-between">
    <button class="navbar__brand flex align-items-center" type="button" (click)="navigateTo('/')">
      <span aria-hidden="true">🐾</span>
      <span class="navbar__name">Lilia Paws Travel</span>
    </button>
    <button class="navbar__burger" type="button" (click)="toggleMenu()" [attr.aria-expanded]="menuOpen" aria-label="Toggle navigation menu">
      <i class="pi" [ngClass]="menuOpen ? 'pi-times' : 'pi-bars'"></i>
    </button>
    <ul class="navbar__links flex align-items-center" [class.open]="menuOpen" role="menubar">
      <li role="none"><button role="menuitem" type="button" [class.active]="isActive('/')" (click)="navigateTo('/')">Home</button></li>
      <li role="none"><button role="menuitem" type="button" [class.active]="isActive('/request')" (click)="navigateTo('/request')">Request Transport</button></li>
      <li role="none"><button role="menuitem" type="button" [class.active]="isActive('/contact')" (click)="navigateTo('/contact')">Contact</button></li>
    </ul>
  </div>
</nav>
