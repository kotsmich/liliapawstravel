<footer class="footer">
  <div class="footer__grid">
    <div>
      <div class="footer__brand"><span aria-hidden="true">🐾</span> Lilia Paws Travel</div>
      <p>{{ 'footer.tagline' | transloco }}</p>
    </div>
    <div>
      <h4>{{ 'footer.navigation' | transloco }}</h4>
      <ul>
        <li><button type="button" class="footer-link" (click)="navigateTo('/')">{{ 'nav.home' | transloco }}</button></li>
        <li><button type="button" class="footer-link" (click)="navigateTo('/request')">{{ 'nav.requestTransport' | transloco }}</button></li>
        <li><button type="button" class="footer-link" (click)="navigateTo('/contact')">{{ 'nav.contact' | transloco }}</button></li>
      </ul>
    </div>
    <div>
      <h4>{{ 'footer.contact' | transloco }}</h4>
      <p><span aria-hidden="true">📧</span> hello&#64;liliapawstravel.com</p>
      <p><span aria-hidden="true">📞</span> +31 6 12 34 56 78</p>
    </div>
  </div>
  <div class="footer__bottom">&copy; {{ year }} {{ 'footer.copyright' | transloco }}</div>
</footer>
