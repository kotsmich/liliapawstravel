<footer class="footer" aria-label="Site footer">

  <!-- Full-width photo background -->
  <div class="footer__bg" aria-hidden="true">
    <img
      src="https://images.unsplash.com/photo-1516734212186-a967f81ad0d7?w=1400&q=80"
      alt=""
      loading="lazy"
    />
    <div class="footer__bg-overlay"></div>
  </div>

  <!-- Top section -->
  <div class="footer__top">
    <div class="footer__grid">

      <!-- Brand column -->
      <div class="footer__brand-col">
        <div class="footer__logo">
          <span class="footer__logo-icon" aria-hidden="true">🐾</span>
          <span class="footer__logo-name">Lilia Paws Travel</span>
        </div>
        <p class="footer__tagline">{{ 'footer.tagline' | transloco }}</p>
        <div class="footer__social" aria-label="Social media">
          <a href="#" class="footer__social-btn" aria-label="Facebook" rel="noopener noreferrer">
            <i class="pi pi-facebook" aria-hidden="true"></i>
          </a>
          <a href="#" class="footer__social-btn" aria-label="Instagram" rel="noopener noreferrer">
            <i class="pi pi-instagram" aria-hidden="true"></i>
          </a>
          <a href="mailto:liliapawstravel@gmail.com" class="footer__social-btn" aria-label="Email">
            <i class="pi pi-envelope" aria-hidden="true"></i>
          </a>
        </div>
      </div>

      <!-- Navigation column -->
      <div class="footer__nav-col">
        <h4 class="footer__col-title">{{ 'footer.navigation' | transloco }}</h4>
        <ul class="footer__links">
          <li>
            <button type="button" class="footer__link" (click)="navigateTo('/')">
              <i class="pi pi-home" aria-hidden="true"></i>
              {{ 'nav.home' | transloco }}
            </button>
          </li>
          <li>
            <button type="button" class="footer__link" (click)="navigateTo('/about')">
              <i class="pi pi-info-circle" aria-hidden="true"></i>
              {{ 'nav.about' | transloco }}
            </button>
          </li>
          <li>
            <button type="button" class="footer__link" (click)="navigateTo('/request')">
              <i class="pi pi-send" aria-hidden="true"></i>
              {{ 'nav.requestTransport' | transloco }}
            </button>
          </li>
          <li>
            <button type="button" class="footer__link" (click)="navigateTo('/contact')">
              <i class="pi pi-envelope" aria-hidden="true"></i>
              {{ 'nav.contact' | transloco }}
            </button>
          </li>
        </ul>
      </div>

      <!-- Contact column -->
      <div class="footer__contact-col">
        <h4 class="footer__col-title">{{ 'footer.contact' | transloco }}</h4>
        <ul class="footer__contact-list">
          <li>
            <a href="mailto:liliapawstravel@gmail.com" class="footer__contact-item">
              <i class="pi pi-envelope" aria-hidden="true"></i>
              <span>liliapawstravel&#64;gmail.com</span>
            </a>
          </li>
          <li>
            <a href="tel:+306907288150" class="footer__contact-item">
              <i class="pi pi-phone" aria-hidden="true"></i>
              <span>+30 690 728 8150</span>
            </a>
          </li>
          <li>
            <a href="tel:+306948225016" class="footer__contact-item">
              <i class="pi pi-phone" aria-hidden="true"></i>
              <span>+30 694 822 5016</span>
            </a>
          </li>
        </ul>
      </div>

    </div>
  </div>

  <!-- Bottom bar -->
  <div class="footer__bottom">
    <span>&copy; {{ year }} {{ 'footer.copyright' | transloco }}</span>
    <span class="footer__bottom-divider" aria-hidden="true">·</span>
    <span class="footer__made">Made with ❤️ for dogs everywhere</span>
  </div>

</footer>
